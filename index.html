<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa: O Brasil e a Dinâmica Imperial Portuguesa</title>
    <style>
        /* Estilo básico para remover margens e garantir que o mapa ocupe a tela toda */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Remove barras de rolagem desnecessárias no body */
            font-family: sans-serif;
        }
        /* Container do iframe ocupa 100% da altura e largura */
        .map-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        /* Estiliza o iframe para se comportar de forma responsiva */
        .map-container iframe {
            width: 100%;
            height: 100%;
            border: none; /* Remove a borda padrão do iframe */
        }
        /* Opcional: Um pequeno rodapé ou crédito, se desejar */
        .footer {
            position: absolute;
            bottom: 10px;
            right: 20px;
            background: rgba(255, 255, 255, 0.8);
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            z-index: 10; /* Fica acima do mapa */
            pointer-events: none; /* Permite clicar "através" do footer no mapa */
        }
        .footer a {
            pointer-events: auto; /* Habilita o clique no link */
            color: #0645ad;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="map-container">
        <!-- IFRAME COM O LINK DO SEU MAPA -->
        <iframe 
            src="https://uploads.knightlab.com/storymapjs/06c22fa43c0475124b7c7b102cd1df56/o-brasil-e-a-dinamica-imperial-portuguesa/index.html" 
            allowfullscreen 
            loading="lazy"
            title="Mapa Interativo: O Brasil e a Dinâmica Imperial Portuguesa">
        </iframe>
    </div>
    <!-- Rodapé opcional com crédito -->
    <div class="footer">
        Mapa criado a partir de <a href="https://uploads.knightlab.com/storymapjs/06c22fa43c0475124b7c7b102cd1df56/o-brasil-e-a-dinamica-imperial-portuguesa/index.html" target="_blank">Fragoso, Gouvêa & Bicalho</a>
    </div>
</body>
</html>
